# SHAPE local/dev stack (no AI service). Usage:
#   docker compose -f docker-compose.shape.yml up -d
#   Then run backend + frontend locally, or build full stack.

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: shape-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shape_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shape_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-shape_db}
    volumes:
      - shape_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shape-network

  redis:
    image: redis:alpine
    container_name: shape-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - shape-network

networks:
  shape-network:
    driver: bridge

volumes:
  shape_postgres_data:
