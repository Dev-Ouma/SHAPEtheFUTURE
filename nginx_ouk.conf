# Rate-limit zones (valid in http{} — conf.d is included there).
# Host deployments: prefer `include nginx_http_limits.conf;` from http{} and remove
# the zone/map block below to avoid duplicate zone names.
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=analytics_track:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=uploads_api:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:20m rate=40r/s;
limit_req_zone $binary_remote_addr zone=form_posts:10m rate=8r/m;

proxy_cache_path /var/cache/nginx/ouk_html levels=1:2 keys_zone=ouk_html:32m
                 max_size=256m inactive=10m use_temp_path=off;

map $http_user_agent $ouk_bad_bot {
    default 0;
    ~*(?i)(nikto|sqlmap|masscan|zgrab|dirbuster|nessus|openvas|wpscan|havij|acunetix|nmap\s|libwww-perl) 1;
}

map $http_cookie $ouk_skip_html_cache {
    default 0;
    ~*ouk_admin_token 1;
}

map $http_rsc $ouk_is_rsc {
    default 0;
    "1" 1;
}

map $arg__rsc $ouk_rsc_query {
    default 0;
    ~. 1;
}

map $http_next_router_prefetch $ouk_router_prefetch {
    default 0;
    ~. 1;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 197.136.12.53 ouk.ac.ke www.ouk.ac.ke;
    client_max_body_size 50M;

    if ($ouk_bad_bot) {
        return 403;
    }

    # Magda (keep existing)
    location ^~ /magda/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location = /api/auth/login {
        limit_req zone=auth_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/analytics/track {
        limit_req zone=analytics_track burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/analytics/track;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/contact-submissions {
        limit_req zone=form_posts burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/contact-submissions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/alumni/join {
        limit_req zone=form_posts burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/alumni/join;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/api/campus-feedback/ {
        limit_req zone=form_posts burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/api/campus-feedback/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/complaints/ {
        limit_req zone=form_posts burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/complaints/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/uploads/ {
        limit_req zone=uploads_api burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public liveness (no auth) — for edge / LB probes
    location = /api/health {
        proxy_pass http://127.0.0.1:3101/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # NestJS Backend API
    location /api/ {
        limit_req zone=api_general burst=80 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Uploaded files served from backend
    location /uploads/ {
        limit_req zone=uploads_api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3101/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    # Long-lived Next.js build assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Next.js Frontend (catch-all) — short anonymous HTML cache
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        proxy_cache ouk_html;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 301 302 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_cache_bypass $http_upgrade $ouk_skip_html_cache $ouk_is_rsc $ouk_rsc_query $ouk_router_prefetch;
        proxy_no_cache $http_upgrade $ouk_skip_html_cache $ouk_is_rsc $ouk_rsc_query $ouk_router_prefetch;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 256;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Report-Only only — see docs/edge-hardening.md before enforcing.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; img-src 'self' data: https: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https: https://fonts.googleapis.com; font-src 'self' data: https: https://fonts.gstatic.com; connect-src 'self' https: wss: ws: https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://www.google.com https://accounts.google.com; frame-ancestors 'self';" always;
}
