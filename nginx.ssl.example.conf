# Production HTTPS edge config (Docker network: frontend/backend).
#
# DO NOT mount this for local/dev. Local keeps nginx.conf (HTTP :80 only).
#
# Enable with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tls.yml up -d
#
# Prerequisites:
#   - Certs at SSL_CERTS_DIR (default /etc/letsencrypt) for ouk.ac.ke
#   - NEXT_PUBLIC_* and CORS_ORIGINS use https://www.ouk.ac.ke (or your domain)
#   - AUTH_COOKIE_SECURE left unset in production (Secure cookies default on)
#
# After HTTPS is stable for a few days, uncomment the HSTS line below
# (see docs/edge-hardening.md — never enable HSTS on HTTP-only hosts).

limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=analytics_track:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=uploads_api:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:20m rate=40r/s;
limit_req_zone $binary_remote_addr zone=form_posts:10m rate=8r/m;

proxy_cache_path /var/cache/nginx/ouk_html levels=1:2 keys_zone=ouk_html:32m
                 max_size=256m inactive=10m use_temp_path=off;

map $http_user_agent $ouk_bad_bot {
    default 0;
    ~*(?i)(nikto|sqlmap|masscan|zgrab|dirbuster|nessus|openvas|wpscan|havij|acunetix|nmap\s|libwww-perl) 1;
}

map $http_cookie $ouk_skip_html_cache {
    default 0;
    ~*ouk_admin_token 1;
}

map $http_rsc $ouk_is_rsc {
    default 0;
    "1" 1;
}

map $arg__rsc $ouk_rsc_query {
    default 0;
    ~. 1;
}

map $http_next_router_prefetch $ouk_router_prefetch {
    default 0;
    ~. 1;
}

# HTTP → HTTPS (ACME challenge stays on :80 for renewals)
server {
    listen 80;
    listen [::]:80;
    server_name ouk.ac.ke www.ouk.ac.ke;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ouk.ac.ke www.ouk.ac.ke;

    # Adjust live/<name>/ if your certbot lineage differs
    ssl_certificate     /etc/letsencrypt/live/ouk.ac.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ouk.ac.ke/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:OUKSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 50M;

    if ($ouk_bad_bot) {
        return 403;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP — default Report-Only (safe for cutover). After docs/edge-hardening.md
    # checklist on the live HTTPS origin: comment Report-Only, uncomment Enforce.
    # Do NOT copy Enforce into local nginx.conf / docker-compose.dev.yml.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; img-src 'self' data: https: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https: https://fonts.googleapis.com; font-src 'self' data: https: https://fonts.gstatic.com; connect-src 'self' https: wss: ws: https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://www.google.com https://accounts.google.com; frame-ancestors 'self';" always;
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https: https://fonts.googleapis.com; font-src 'self' data: https: https://fonts.gstatic.com; connect-src 'self' https: wss: ws: https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://www.google.com https://accounts.google.com; frame-ancestors 'self';" always;
    # HSTS — uncomment ONLY after HTTPS is confirmed stable on the real domain.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/auth/login {
        limit_req zone=auth_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/analytics/track {
        limit_req zone=analytics_track burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/analytics/track;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/contact-submissions {
        limit_req zone=form_posts burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/contact-submissions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/alumni/join {
        limit_req zone=form_posts burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/alumni/join;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/api/campus-feedback/ {
        limit_req zone=form_posts burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/api/campus-feedback/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/complaints/ {
        limit_req zone=form_posts burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/complaints/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/uploads/ {
        limit_req zone=uploads_api burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        limit_req zone=uploads_api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /api/health {
        proxy_pass http://backend:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location /api/ {
        limit_req zone=api_general burst=80 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache ouk_html;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 301 302 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_cache_bypass $http_upgrade $ouk_skip_html_cache $ouk_is_rsc $ouk_rsc_query $ouk_router_prefetch;
        proxy_no_cache $http_upgrade $ouk_skip_html_cache $ouk_is_rsc $ouk_rsc_query $ouk_router_prefetch;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
