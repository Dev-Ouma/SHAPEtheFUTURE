name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  frontend:
    name: Frontend typecheck & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check:catalogue
      # Full OUK-era lint backlog is non-blocking; builds use eslint.ignoreDuringBuilds.
      - name: Lint (advisory)
        continue-on-error: true
        run: npm run lint

  backend:
    name: Backend build, Shape lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Lint Shape module (advisory)
        continue-on-error: true
        run: npx eslint "src/shape/**/*.ts" --max-warnings=50
      - name: Shape unit tests
        run: npx jest src/shape --runInBand

  hygiene:
    name: Deploy hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-deploy-hygiene.mjs

  a11y:
    name: Public pages axe (critical/serious)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NODE_ENV: production
      - run: npm run test:a11y
        env:
          CI: true

  smoke:
    name: Critical-path smoke (public + fence)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NODE_ENV: production
      - run: npm run test:smoke
        env:
          CI: true
