# Opt-in production overlay — does NOT change local/dev defaults.
#
# Usage (after a real .env with strong secrets + HTTPS URLs):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml build
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Local stay on:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# HTTPS (after certs exist) — add the TLS overlay (do not edit this file):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tls.yml up -d
# See docs/edge-hardening.md § TLS cutover.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://www.ouk.ac.ke/api}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://www.ouk.ac.ke}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.ouk.ac.ke}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}

  backend:
    environment:
      # Still opt-in — only enable after migration history is reconciled.
      - RUN_MIGRATIONS_ON_START=${RUN_MIGRATIONS_ON_START:-false}
      # Leave unset on HTTPS so Secure cookies default on in production.
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-}
