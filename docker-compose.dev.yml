# Optional local overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Prefer copying .env.example → .env with real secrets instead of relying on these.

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ouk_dev_only_password}

  backend:
    environment:
      - NODE_ENV=development
      - TYPEORM_SYNCHRONIZE=${TYPEORM_SYNCHRONIZE:-true}
      - FORBID_NON_WHITELISTED=${FORBID_NON_WHITELISTED:-false}
      - RUN_MIGRATIONS_ON_START=${RUN_MIGRATIONS_ON_START:-false}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-ouk_dev_only_password}
      - JWT_SECRET=${JWT_SECRET:-ouk_dev_only_jwt_change_me}

  ai-service:
    environment:
      - DB_PASSWORD=${POSTGRES_PASSWORD:-ouk_dev_only_password}

  frontend:
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost}
